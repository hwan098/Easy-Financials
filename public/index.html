<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DART 공시 분석</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-graph-up-arrow me-2"></i>DART 공시 분석
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 검색 섹션 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-search me-2"></i>회사 검색</h5>
                <div class="row g-3">
                    <div class="col-md-8">
                        <input type="text" class="form-control form-control-lg" id="searchInput"
                               placeholder="회사명 또는 종목코드를 입력하세요" autocomplete="off">
                        <div id="searchResults" class="search-results"></div>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-primary btn-lg w-100" id="searchBtn">
                            <i class="bi bi-search me-2"></i>검색
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 선택된 회사 정보 -->
        <div id="companyInfo" class="card mb-4" style="display: none;">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-building me-2"></i>선택된 회사</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>회사명:</strong> <span id="companyName"></span></p>
                        <p><strong>영문명:</strong> <span id="companyEngName"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>고유번호:</strong> <span id="corpCode"></span></p>
                        <p><strong>종목코드:</strong> <span id="stockCode"></span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 탭 네비게이션 -->
        <div id="mainContent" style="display: none;">
            <ul class="nav nav-tabs" id="mainTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="financial-tab" data-bs-toggle="tab"
                            data-bs-target="#financial" type="button" role="tab">
                        <i class="bi bi-bar-chart me-2"></i>재무제표
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="disclosure-tab" data-bs-toggle="tab"
                            data-bs-target="#disclosure" type="button" role="tab">
                        <i class="bi bi-file-text me-2"></i>공시 목록
                    </button>
                </li>
            </ul>

            <div class="tab-content" id="mainTabContent">
                <!-- 재무제표 탭 (기본 활성) -->
                <div class="tab-pane fade show active" id="financial" role="tabpanel">
                    <div class="card border-top-0 rounded-top-0">
                        <div class="card-body">
                            <div class="row mb-4">
                                <div class="col-md-3">
                                    <label class="form-label">보고서 유형</label>
                                    <select class="form-select" id="reportType">
                                        <option value="11011">사업보고서 (연간)</option>
                                        <option value="11013">1분기보고서</option>
                                        <option value="11012">반기보고서</option>
                                        <option value="11014">3분기보고서</option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-flex align-items-end">
                                    <button class="btn btn-outline-primary w-100" id="loadFinancialBtn">
                                        <i class="bi bi-arrow-repeat me-2"></i>조회
                                    </button>
                                </div>
                            </div>

                            <div id="financialSummaryCards" class="row g-3 mb-4" style="display: none;"></div>

                            <div id="aiAnalysisSection" class="text-center mb-4" style="display: none;">
                                <button class="btn btn-lg btn-gradient-ai px-5 py-3" id="aiAnalyzeBtn">
                                    <i class="bi bi-robot me-2"></i>AI 재무 분석하기
                                </button>
                            </div>

                            <div id="financialCharts" style="display: none;">
                                <div class="row g-4 mb-4">
                                    <div class="col-lg-8">
                                        <div class="card chart-card">
                                            <div class="card-body">
                                                <h6 class="chart-title"><i class="bi bi-bar-chart-fill me-2 text-primary"></i>매출 & 이익 추이</h6>
                                                <canvas id="revenueChart" height="280"></canvas>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-lg-4">
                                        <div class="card chart-card">
                                            <div class="card-body">
                                                <h6 class="chart-title"><i class="bi bi-pie-chart-fill me-2 text-info"></i>재무 구조</h6>
                                                <canvas id="structureChart" height="280"></canvas>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row g-4 mb-4">
                                    <div class="col-12">
                                        <div class="card chart-card">
                                            <div class="card-body">
                                                <h6 class="chart-title"><i class="bi bi-graph-up me-2 text-success"></i>수익성 지표 변화</h6>
                                                <canvas id="marginChart" height="200"></canvas>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div id="financialTableSection">
                                <h6 class="mb-3"><i class="bi bi-table me-2"></i>상세 재무 데이터</h6>
                                <div class="table-responsive">
                                    <table class="table table-bordered table-hover" id="financialTable">
                                        <thead class="table-dark">
                                            <tr>
                                                <th>항목</th>
                                                <th id="year1Col">-</th>
                                                <th id="year2Col">-</th>
                                                <th id="year3Col">-</th>
                                                <th>전기 대비 변동</th>
                                            </tr>
                                        </thead>
                                        <tbody id="financialBody">
                                            <tr>
                                                <td colspan="5" class="text-center text-muted">
                                                    회사를 선택하고 조회 버튼을 클릭하세요
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 공시 목록 탭 -->
                <div class="tab-pane fade" id="disclosure" role="tabpanel">
                    <div class="card border-top-0 rounded-top-0">
                        <div class="card-body">
                            <div class="row g-3 mb-3">
                                <div class="col-md-3">
                                    <label class="form-label">시작일</label>
                                    <input type="date" class="form-control" id="startDate">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">종료일</label>
                                    <input type="date" class="form-control" id="endDate">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">공시유형</label>
                                    <select class="form-select" id="disclosureType">
                                        <option value="">전체</option>
                                        <option value="A">정기공시</option>
                                        <option value="B">주요사항보고</option>
                                        <option value="C">발행공시</option>
                                        <option value="D">지분공시</option>
                                        <option value="E">기타공시</option>
                                        <option value="F">외부감사관련</option>
                                        <option value="G">펀드공시</option>
                                        <option value="H">자산유동화</option>
                                        <option value="I">거래소공시</option>
                                        <option value="J">공정위공시</option>
                                    </select>
                                </div>
                                <div class="col-md-3 d-flex align-items-end">
                                    <button class="btn btn-outline-primary w-100" id="loadDisclosureBtn">
                                        <i class="bi bi-arrow-repeat me-2"></i>조회
                                    </button>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover" id="disclosureTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>접수일자</th>
                                            <th>보고서명</th>
                                            <th>제출인</th>
                                            <th>공시유형</th>
                                            <th>원문</th>
                                            <th>AI요약</th>
                                        </tr>
                                    </thead>
                                    <tbody id="disclosureBody">
                                        <tr>
                                            <td colspan="6" class="text-center text-muted">
                                                회사를 선택하고 조회 버튼을 클릭하세요
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <nav id="disclosurePagination" style="display: none;">
                                <ul class="pagination justify-content-center"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 공시 요약 모달 -->
    <div class="modal fade" id="aiSummaryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-robot me-2"></i>AI 공시 요약</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6 id="summaryTitle" class="mb-3"></h6>
                    <div id="summaryContent" class="summary-content"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 재무 분석 모달 -->
    <div class="modal fade" id="aiFinancialModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-gradient-ai-header text-white">
                    <h5 class="modal-title"><i class="bi bi-robot me-2"></i>AI 재무 분석 리포트</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body ai-analysis-body">
                    <div id="financialAnalysisContent"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-5 py-3 bg-light">
        <div class="container text-center text-muted">
            <small>데이터 출처: 금융감독원 전자공시시스템(DART)</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
